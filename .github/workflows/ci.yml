name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
      # prisma/schema.prisma uses these env vars for `datasource db`.
      # Provide syntactically-valid placeholder values for CI so `prisma generate` can run
      # without real secrets/DB access.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?connection_limit=1
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Rule-based PR recommendation (no AI / no API keys).
      # - Finds the latest Vercel preview URL from Vercel's PR comments
      # - Runs a minimal smoke check by hitting /dashboard on the preview
      # - Posts/updates a single PR comment with an approve vs request-changes recommendation
      - name: Post PR recommendation (Vercel preview + smoke check)
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          CI_STATUS: ${{ job.status }}
        with:
          script: |
            const marker = "<!-- pr-ci-recommendation -->";
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            // Poll a bit because Vercel may take a minute to post the preview URL.
            const findPreviewUrl = async () => {
              const regex = /(https?:\/\/[^\s)]+\.vercel\.app[^\s)]*)/i;
              for (let attempt = 0; attempt < 10; attempt++) {
                const { data: comments } = await github.rest.issues.listComments({
                  owner,
                  repo,
                  issue_number,
                  per_page: 100,
                });

                for (const c of comments) {
                  if (!c.body) continue;
                  const m = c.body.match(regex);
                  if (m && m[1]) return m[1];
                }
                await new Promise((r) => setTimeout(r, 10000));
              }
              return null;
            };

            const previewUrl = await findPreviewUrl();

            let smokeStatus = null;
            if (previewUrl) {
              // Best-effort check: preview might require auth and/or redirect, but a 500 is still actionable.
              // We can't pass the URL into curl safely without shell, so do a lightweight fetch via node.
              // Use global fetch (available on the runner via Node 20+ / GitHub script runtime).
              try {
                const res = await fetch(new URL("/dashboard", previewUrl).toString(), {
                  redirect: "follow",
                });
                smokeStatus = res.status;
              } catch (e) {
                smokeStatus = "error";
              }
            }

            const ciOk = process.env.CI_STATUS === "success";
            const smokeOk =
              Boolean(previewUrl) &&
              typeof smokeStatus === "number" &&
              smokeStatus < 500;

            const lines = [
              marker,
              "",
              `## PR CI + Vercel preview`,
              "",
              `- Build: ${ciOk ? "✅ passed" : "❌ failed"}`,
              `- Vercel preview: ${previewUrl ? `[link](${previewUrl})` : "_not found_"}`,
              `- Smoke check (/dashboard): ${smokeStatus === null ? "_skipped_" : String(smokeStatus)}`,
            ];

            const commentBody = lines.join("\n");

            // Update existing comment if we posted one before, otherwise create.
            const { data: existing } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = existing.find((c) => c.body && c.body.includes(marker));
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }
